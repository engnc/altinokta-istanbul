<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etkinlikler — Altı Nokta Körler Derneği İstanbul Şubesi</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <div class="sayfa-baslik">
    <h1>Etkinlikler</h1>
    <p>Sosyal ve kültürel etkinliklerimize katılın</p>
  </div>
  <nav class="breadcrumb" aria-label="Konum">
    <a href="/index.html">Ana Sayfa</a> <span> › Etkinlikler</span>
  </nav>

  <section class="bolum">
    <div class="bolum-ic">
      <div class="kart-grid" id="etkinlikler-liste">
        <div style="text-align:center;grid-column:1/-1;color:var(--metin-ac);padding:2rem">Etkinlikler yükleniyor...</div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/js/header.js"></script>
  <script>
    async function etkinliklerYukle() {
      const konteyner = document.getElementById('etkinlikler-liste');
      try {
        const res = await fetch('/etkinlikler/etkinlikler.json');
        const data = await res.json();
        if (!data.items || data.items.length === 0) {
          konteyner.innerHTML = '<p style="text-align:center;color:var(--metin-ac);grid-column:1/-1">Henüz etkinlik eklenmemiş.</p>';
          return;
        }
        konteyner.innerHTML = data.items.map(e => `
          <div class="kart">
            <div class="kart-gorsel" style="background:var(--lacivert);height:120px;font-size:2.8rem;display:flex;align-items:center;justify-content:center">${e.ikon || '📅'}</div>
            <div class="kart-icerik">
              <p class="kart-tarih">${e.tarih} · ${e.saat}</p>
              <h3>${e.baslik}</h3>
              <p>${e.ozet}</p>
              <span class="kart-etiket">📍 ${e.konum}</span>
            </div>
          </div>
        `).join('');
      } catch {
        konteyner.innerHTML = '<p style="text-align:center;color:var(--metin-ac);grid-column:1/-1">İçerik yüklenemedi.</p>';
      }
    }
    etkinliklerYukle();
  </script>
  <script src="/js/main.js"></script>
</body>
</html>
