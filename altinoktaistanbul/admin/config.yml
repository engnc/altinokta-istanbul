backend:
  name: git-gateway
  branch: main

media_folder: "galeri/img"
public_folder: "/galeri/img"

locale: tr

collections:
  - name: "haberler"
    label: "Haberler"
    folder: "haberler"
    create: true
    slug: "{{slug}}"
    identifier_field: baslik
    format: json
    fields:
      - { label: "Başlık", name: "baslik", widget: "string" }
      - { label: "Kısa URL (slug)", name: "slug", widget: "string", hint: "URL'de görünür. Türkçe karakter ve boşluk kullanmayın. Örnek: yeni-etkinlik-2025" }
      - { label: "Tarih", name: "tarih", widget: "string", hint: "Örnek: Mayıs 2025" }
      - { label: "Özet", name: "ozet", widget: "text", hint: "Listede görünecek kısa açıklama" }
      - { label: "İçerik", name: "icerik", widget: "markdown", required: false }
      - { label: "Kapak Fotoğrafı (URL)", name: "gorsel", widget: "string", required: false, hint: "Fotoğraf URL'si. Boş bırakabilirsiniz." }

  - name: "etkinlikler"
    label: "Etkinlikler"
    folder: "etkinlikler"
    create: true
    slug: "{{slug}}"
    identifier_field: baslik
    format: json
    fields:
      - { label: "Etkinlik Adı", name: "baslik", widget: "string" }
      - { label: "Kısa URL (slug)", name: "slug", widget: "string" }
      - { label: "Tarih", name: "tarih", widget: "string", hint: "Örnek: 15 Haziran 2025" }
      - { label: "Saat", name: "saat", widget: "string", hint: "Örnek: 14:00" }
      - { label: "Konum", name: "konum", widget: "string" }
      - { label: "Özet", name: "ozet", widget: "text" }
      - { label: "İkon (emoji)", name: "ikon", widget: "string", required: false, hint: "Emoji kullanabilirsiniz. Örnek: 📅 🎭 🎶" }

  - name: "galeri"
    label: "Galeri Fotoğrafları"
    folder: "galeri"
    create: true
    slug: "{{slug}}"
    identifier_field: baslik
    format: json
    fields:
      - { label: "Başlık", name: "baslik", widget: "string" }
      - { label: "Fotoğraf URL", name: "url", widget: "string", hint: "Cloudinary veya başka bir servis URL'si" }

  - name: "sayfalar"
    label: "Sayfalar"
    files:
      - label: "Hakkımızda"
        name: "hakkinda"
        file: "hakkinda/icerik.json"
        fields:
          - { label: "Sayfa Başlığı", name: "baslik", widget: "string" }
          - { label: "İçerik", name: "icerik", widget: "markdown" }
      - label: "Bağış Bilgileri"
        name: "bagis"
        file: "bagis/icerik.json"
        fields:
          - { label: "Banka Adı", name: "banka", widget: "string" }
          - { label: "IBAN", name: "iban", widget: "string" }
          - { label: "Ek Bilgi", name: "notlar", widget: "text", required: false }
